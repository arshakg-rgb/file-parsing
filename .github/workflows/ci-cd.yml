name: CI/CD Pipeline

# Deploy by delegating to the authoritative Cloud Build config (cloudbuild.yaml).
# The previous version did its own docker build + `gcloud run deploy` with UNDERSCORE
# service names (stream_parser, detect_bootstrap) which are invalid Cloud Run names, so it
# never actually updated the live (hyphen-named) services — the code appeared to "never
# deploy". cloudbuild.yaml has the correct service names, Artifact Registry images, secrets,
# Cloud SQL, and the fast-test service subset. Submitting it keeps a single source of truth.

# Real deploys run via the Cloud Build TRIGGER on this repo (it runs cloudbuild.yaml on push
# and succeeds). This workflow is kept only as a manual fallback — it does NOT run on push,
# so it no longer produces a red "failed" run on every push. It still requires the GCP
# Workload Identity secrets (GCP_WORKLOAD_IDENTITY_PROVIDER / GCP_SERVICE_ACCOUNT_EMAIL) to
# be configured before it can actually submit a build.
on:
  workflow_dispatch: {}

env:
  GCP_PROJECT_ID: data-etl-499916

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Submit Cloud Build (authoritative build + deploy)
        run: gcloud builds submit --config cloudbuild.yaml --project "$GCP_PROJECT_ID" .
