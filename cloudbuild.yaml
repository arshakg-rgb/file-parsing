options:
  logging: CLOUD_LOGGING_ONLY
  # _AI_IMAGE/_RETRY_IMAGE/_ARCHIVE_ENTRY_IMAGE are defined below but currently unused
  # (those services stay disabled). ALLOW_LOOSE stops Cloud Build's "substitution key not
  # matched in the template" error for them. (load + report are now enabled.)
  substitution_option: 'ALLOW_LOOSE'
substitutions:
  _REGION: us-central1
  # Base image names (no tag). The actual tag is computed at build time in the
  # "Compute image tag" step below and read from /workspace/tag.txt in every
  # later step. This avoids depending on Cloud Build's $COMMIT_SHA/$SHORT_SHA
  # substitutions, which are only populated for certain trigger types and fail
  # the whole build with "could not parse reference" if they resolve empty.
  _JOB_IMAGE_BASE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/job-service
  _INGEST_IMAGE_BASE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/ingest
  _DETECT_IMAGE_BASE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/detect-bootstrap
  _STREAM_IMAGE_BASE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/stream-parser
  _AI_IMAGE_BASE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/ai-classifier
  _LOAD_IMAGE_BASE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/load
  _REPORT_IMAGE_BASE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/report
  _RETRY_IMAGE_BASE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/retry
  _ARCHIVE_ENTRY_IMAGE_BASE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/archive-entry-consumer
  # AI classification mode for the streaming parser: off | mock | live.
  _AI_INLINE_MODE: mock
  # Hard cap on inline AI calls per job. Mock is free, but a low cap still aborts early.
  _MAX_AI_CALLS_PER_JOB: '100'

steps:
  # Step 0: Compute the image tag at build time from the actual checked-out
  # source. Prefer the real short commit SHA; fall back to a timestamp if git
  # info isn't available (e.g. manual/non-repo-triggered builds). Every later
  # step reads this from /workspace/tag.txt via `TAG=$(cat /workspace/tag.txt)`.
  - name: 'gcr.io/cloud-builders/git'
    id: 'Compute image tag'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(git rev-parse --short HEAD 2>/dev/null || true)
        if [ -z "$$TAG" ]; then
          TAG="manual-$(date +%Y%m%d%H%M%S)"
        fi
        echo "$$TAG" > /workspace/tag.txt
        echo "Using image tag: $$TAG"

  # Step 1: Load secrets into environment file
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Create .env file from secrets'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "GCP_PROJECT_ID=data-etl-499916" >> .env
        echo "DATA_BUCKET=$(gcloud secrets versions access latest --secret=FILE_DATA_BUCKET)" >> .env
        echo "FILE_DATABASE_URL=$(gcloud secrets versions access latest --secret=FILE_DATABASE_URL)" >> .env
        echo "QUEUE_BACKEND=pubsub" >> .env
        echo "FIRESTORE_DATABASE_ID=$(gcloud secrets versions access latest --secret=FILE_FIRESTORE_DATABASE_ID)" >> .env
        echo "TEMPLATE_COLLECTION=file-parsing-templates" >> .env
        echo "BEDROCK_MODEL_ID=$(gcloud secrets versions access latest --secret=FILE_BEDROCK_MODEL_ID)" >> .env
        echo "HEALTH_CHECK_PORT=8080" >> .env
        echo "NODE_ENV=production" >> .env
        echo "LOKI_HOST=$(gcloud secrets versions access latest --secret=FILE_LOKI_HOST)" >> .env
        echo "LOKI_USERNAME=$(gcloud secrets versions access latest --secret=FILE_LOKI_USERNAME)" >> .env
        echo "LOKI_PASSWORD=$(gcloud secrets versions access latest --secret=FILE_LOKI_PASSWORD)" >> .env
        echo "ARCHIVE_ENTRY_QUEUE_URL=$(gcloud secrets versions access latest --secret=FILE_ARCHIVE_ENTRY_QUEUE_URL)" >> .env
        echo "LARGE_FILE_THRESHOLD_BYTES=524288000" >> .env

  # Step 2: Use Node.js v20 to install and build
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        npm install
        npm run build

  # Step 3: Build and push Docker images
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(cat /workspace/tag.txt)
        docker build -f Dockerfile.job -t "${_JOB_IMAGE_BASE}:$$TAG" .
        docker push "${_JOB_IMAGE_BASE}:$$TAG"

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(cat /workspace/tag.txt)
        docker build -f Dockerfile.ingest -t "${_INGEST_IMAGE_BASE}:$$TAG" .
        docker push "${_INGEST_IMAGE_BASE}:$$TAG"

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(cat /workspace/tag.txt)
        docker build -f Dockerfile.detect -t "${_DETECT_IMAGE_BASE}:$$TAG" .
        docker push "${_DETECT_IMAGE_BASE}:$$TAG"

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(cat /workspace/tag.txt)
        docker build -f Dockerfile.stream -t "${_STREAM_IMAGE_BASE}:$$TAG" .
        docker push "${_STREAM_IMAGE_BASE}:$$TAG"

  # >>> DISABLED FOR FAST TEST BUILDS: ai-classifier (AI runs in-process in detect/stream;
  #     the standalone /classify HTTP service has no callers). Uncomment to restore. <<<
  # - name: 'gcr.io/cloud-builders/docker'
  #   entrypoint: bash
  #   args:
  #     - -c
  #     - |
  #       TAG=$(cat /workspace/tag.txt)
  #       docker build -f Dockerfile.ai -t "${_AI_IMAGE_BASE}:$$TAG" .
  #       docker push "${_AI_IMAGE_BASE}:$$TAG"

  # load + report: required for jobs to progress past "loading"/"reporting" to "done".
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(cat /workspace/tag.txt)
        docker build -f Dockerfile.load -t "${_LOAD_IMAGE_BASE}:$$TAG" .
        docker push "${_LOAD_IMAGE_BASE}:$$TAG"

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(cat /workspace/tag.txt)
        docker build -f Dockerfile.report -t "${_REPORT_IMAGE_BASE}:$$TAG" .
        docker push "${_REPORT_IMAGE_BASE}:$$TAG"

  # >>> DISABLED FOR FAST TEST BUILDS: retry. Uncomment to restore. <<<
  # - name: 'gcr.io/cloud-builders/docker'
  #   entrypoint: bash
  #   args:
  #     - -c
  #     - |
  #       TAG=$(cat /workspace/tag.txt)
  #       docker build -f Dockerfile.retry -t "${_RETRY_IMAGE_BASE}:$$TAG" .
  #       docker push "${_RETRY_IMAGE_BASE}:$$TAG"

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(cat /workspace/tag.txt)
        docker build -f Dockerfile.archive-entry -t "${_ARCHIVE_ENTRY_IMAGE_BASE}:$$TAG" .
        docker push "${_ARCHIVE_ENTRY_IMAGE_BASE}:$$TAG"

  # Step 4: Deploy to Cloud Run
  # Each service: (1) strip any conflicting plain env vars, (2) strip any conflicting
  # secret-backed vars, (3) deploy with all four sensitive values as secret references.
  # This makes future secret rotations always work without type-conflict errors.
  #
  # NOTE ON SCALING/CPU FLAGS:
  # All backend/consumer services below now explicitly set --min-instances,
  # --max-instances, and --no-cpu-throttling on every deploy. This is intentional
  # and MUST stay in sync with any manual console changes — Cloud Run does NOT
  # inherit settings between revisions. Whatever is in this file wins on every
  # push. If you change these in the console, also update them here or they will
  # be reverted on the next deploy.
  #
  # NOTE ON --no-traffic: every real deploy call below (the third call in each
  # block) also passes --no-traffic, so a new revision is created and fully
  # configured but stays dark (0% traffic) until Step 5 runs. Step 5 then
  # atomically flips all services to their new revision together, instead of
  # each one going live piecemeal as its own build/deploy step finishes.

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(cat /workspace/tag.txt)
        IMAGE="${_JOB_IMAGE_BASE}:$$TAG"

        gcloud run deploy job-service \
          --image "$$IMAGE" \
          --region $_REGION \
          --platform managed \
          --no-traffic \
          --remove-env-vars=DATABASE_URL,FILE_DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy job-service \
          --image "$$IMAGE" \
          --region $_REGION \
          --platform managed \
          --no-traffic \
          --remove-secrets=DATABASE_URL,FILE_DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy job-service \
          --image "$$IMAGE" \
          --region $_REGION \
          --platform managed \
          --no-traffic \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 512Mi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080 \
          --update-secrets=FILE_DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        TAG=$(cat /workspace/tag.txt)
        IMAGE="${_INGEST_IMAGE_BASE}:$$TAG"

        gcloud run deploy ingest \
          --image "$$IMAGE" \
          --region $_REGION \
          --platform managed \
          --no-traffic \
          --remove-env-vars=DATABASE_URL,FILE_DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy ingest \
          --image "$$IMAGE" \
          --region $_REGION \
          --platform managed \
          --no-traffic \
          --remove-secrets=DATABASE_URL,FILE_DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy ingest \
          --image "$$IMAGE" \
          --region $_REGION \
          --platform managed \
          --no-traffic \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 4Gi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --execution-environment gen2 \
          --session-affinity \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080,RAR_TEMP_MOUNT=/mnt/scratch,ARCHIVE_ENTRY_QUEUE_URL=pubsub://projects/data-etl-499916/topics/fpp-archive-entry,LARGE_FILE_THRESHOLD_BYTES=524288000 \
          --add-volume name=rar-temp,type=cloud-storage,bucket=datalead-osint \
          --add-volume-mount volume=rar-temp,mount-path=/mnt/scratch \
          --update-secrets=FILE_DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
