options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _REGION: us-central1
  _JOB_IMAGE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/job-service:latest
  _INGEST_IMAGE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/ingest:latest
  _DETECT_IMAGE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/detect-bootstrap:latest
  _STREAM_IMAGE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/stream-parser:latest
  _AI_IMAGE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/ai-classifier:latest
  _LOAD_IMAGE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/load:latest
  _REPORT_IMAGE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/report:latest
  _RETRY_IMAGE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/retry:latest
  _ARCHIVE_ENTRY_IMAGE: us-central1-docker.pkg.dev/data-etl-499916/file-parsing/archive-entry-consumer:latest

steps:
  # Step 1: Load secrets into environment file
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Create .env file from secrets'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "GCP_PROJECT_ID=data-etl-499916" >> .env
        echo "DATA_BUCKET=$(gcloud secrets versions access latest --secret=FILE_DATA_BUCKET)" >> .env
        echo "DATABASE_URL=$(gcloud secrets versions access latest --secret=FILE_DATABASE_URL)" >> .env
        echo "QUEUE_BACKEND=pubsub" >> .env
        echo "FIRESTORE_DATABASE_ID=$(gcloud secrets versions access latest --secret=FILE_FIRESTORE_DATABASE_ID)" >> .env
        echo "TEMPLATE_COLLECTION=file-parsing-templates" >> .env
        echo "BEDROCK_MODEL_ID=$(gcloud secrets versions access latest --secret=FILE_BEDROCK_MODEL_ID)" >> .env
        echo "HEALTH_CHECK_PORT=8080" >> .env
        echo "NODE_ENV=production" >> .env
        echo "LOKI_HOST=$(gcloud secrets versions access latest --secret=FILE_LOKI_HOST)" >> .env
        echo "LOKI_USERNAME=$(gcloud secrets versions access latest --secret=FILE_LOKI_USERNAME)" >> .env
        echo "LOKI_PASSWORD=$(gcloud secrets versions access latest --secret=FILE_LOKI_PASSWORD)" >> .env
        echo "ARCHIVE_ENTRY_QUEUE_URL=$(gcloud secrets versions access latest --secret=FILE_ARCHIVE_ENTRY_QUEUE_URL)" >> .env
        echo "LARGE_FILE_THRESHOLD_BYTES=524288000" >> .env

  # Step 2: Use Node.js v20 to install and build
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        npm install
        npm run build

  # Step 3: Build and push Docker images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.job', '-t', '$_JOB_IMAGE', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_JOB_IMAGE']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.ingest', '-t', '$_INGEST_IMAGE', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_INGEST_IMAGE']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.detect', '-t', '$_DETECT_IMAGE', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_DETECT_IMAGE']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.stream', '-t', '$_STREAM_IMAGE', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_STREAM_IMAGE']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.ai', '-t', '$_AI_IMAGE', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AI_IMAGE']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.load', '-t', '$_LOAD_IMAGE', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_LOAD_IMAGE']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.report', '-t', '$_REPORT_IMAGE', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_REPORT_IMAGE']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.retry', '-t', '$_RETRY_IMAGE', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_RETRY_IMAGE']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.archive-entry', '-t', '$_ARCHIVE_ENTRY_IMAGE', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_ARCHIVE_ENTRY_IMAGE']

  # Step 4: Deploy to Cloud Run
  # Each service: (1) strip any conflicting plain env vars, (2) strip any conflicting
  # secret-backed vars, (3) deploy with all four sensitive values as secret references.
  # This makes future secret rotations always work without type-conflict errors.
  #
  # NOTE ON SCALING/CPU FLAGS:
  # All backend/consumer services below now explicitly set --min-instances,
  # --max-instances, and --no-cpu-throttling on every deploy. This is intentional
  # and MUST stay in sync with any manual console changes — Cloud Run does NOT
  # inherit settings between revisions. Whatever is in this file wins on every
  # push. If you change these in the console, also update them here or they will
  # be reverted on the next deploy.

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy job-service \
          --image $_JOB_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-env-vars=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy job-service \
          --image $_JOB_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-secrets=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy job-service \
          --image $_JOB_IMAGE \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 512Mi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080 \
          --update-secrets=DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ingest \
          --image $_INGEST_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-env-vars=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy ingest \
          --image $_INGEST_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-secrets=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy ingest \
          --image $_INGEST_IMAGE \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 4Gi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --execution-environment gen2 \
          --session-affinity \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080,RAR_TEMP_MOUNT=/mnt/scratch,ARCHIVE_ENTRY_QUEUE_URL=pubsub://projects/data-etl-499916/topics/fpp-archive-entry,LARGE_FILE_THRESHOLD_BYTES=524288000 \
          --add-volume name=rar-temp,type=cloud-storage,bucket=datalead-osint \
          --add-volume-mount volume=rar-temp,mount-path=/mnt/scratch \
          --update-secrets=DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy detect-bootstrap \
          --image $_DETECT_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-env-vars=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy detect-bootstrap \
          --image $_DETECT_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-secrets=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy detect-bootstrap \
          --image $_DETECT_IMAGE \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 512Mi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080 \
          --update-secrets=DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy stream-parser \
          --image $_STREAM_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-env-vars=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy stream-parser \
          --image $_STREAM_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-secrets=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy stream-parser \
          --image $_STREAM_IMAGE \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 1Gi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080 \
          --update-secrets=DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ai-classifier \
          --image $_AI_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-env-vars=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy ai-classifier \
          --image $_AI_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-secrets=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy ai-classifier \
          --image $_AI_IMAGE \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 512Mi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080 \
          --update-secrets=DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy load \
          --image $_LOAD_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-env-vars=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy load \
          --image $_LOAD_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-secrets=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy load \
          --image $_LOAD_IMAGE \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 512Mi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080 \
          --update-secrets=DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy report \
          --image $_REPORT_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-env-vars=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy report \
          --image $_REPORT_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-secrets=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy report \
          --image $_REPORT_IMAGE \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 512Mi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080 \
          --update-secrets=DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy retry \
          --image $_RETRY_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-env-vars=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy retry \
          --image $_RETRY_IMAGE \
          --region $_REGION \
          --platform managed \
          --remove-secrets=DATABASE_URL,DATA_BUCKET,FIRESTORE_DATABASE_ID,BEDROCK_MODEL_ID,LOKI_HOST,LOKI_USERNAME,LOKI_PASSWORD || true

        gcloud run deploy retry \
          --image $_RETRY_IMAGE \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --add-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 512Mi \
          --cpu 1 \
          --timeout 3600s \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080 \
          --update-secrets=DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

  # Deploy archive_entry_consumer as Cloud Run Job (not Service) to escape 3600s timeout
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs deploy archive-entry-consumer \
          --image $_ARCHIVE_ENTRY_IMAGE \
          --region $_REGION \
          --service-account=datalead-osint@data-etl-499916.iam.gserviceaccount.com \
          --set-cloudsql-instances=data-etl-499916:us-central1:datalead-osint \
          --memory 2Gi \
          --cpu 1 \
          --max-retries 3 \
          --task-timeout 7200s \
          --set-env-vars QUEUE_BACKEND=pubsub,GCP_PROJECT_ID=data-etl-499916,TEMPLATE_COLLECTION=file-parsing-templates,HEALTH_CHECK_PORT=8080,ARCHIVE_ENTRY_QUEUE_URL=pubsub://projects/data-etl-499916/topics/fpp-archive-entry,LARGE_FILE_THRESHOLD_BYTES=524288000 \
          --update-secrets=DATABASE_URL=FILE_DATABASE_URL:latest,DATA_BUCKET=FILE_DATA_BUCKET:latest,FIRESTORE_DATABASE_ID=FILE_FIRESTORE_DATABASE_ID:latest,BEDROCK_MODEL_ID=FILE_BEDROCK_MODEL_ID:latest,LOKI_HOST=FILE_LOKI_HOST:latest,LOKI_USERNAME=FILE_LOKI_USERNAME:latest,LOKI_PASSWORD=FILE_LOKI_PASSWORD:latest

images:
  - $_JOB_IMAGE
  - $_INGEST_IMAGE
  - $_DETECT_IMAGE
  - $_STREAM_IMAGE
  - $_AI_IMAGE
  - $_LOAD_IMAGE
  - $_REPORT_IMAGE
  - $_RETRY_IMAGE
  - $_ARCHIVE_ENTRY_IMAGE