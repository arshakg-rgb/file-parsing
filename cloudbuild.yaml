  # Step 5: Migrate traffic to the newly deployed revisions.
  # Each service above is deployed with --no-traffic so a bad image never
  # breaks live traffic before config is validated. This final step atomically
  # shifts 100 % traffic to the latest revision of every active service.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        for svc in job-service ingest detect-bootstrap stream-parser load report archive-entry-consumer; do
          gcloud run services update-traffic $svc --to-latest --region $_REGION || true
        done

